name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [QA, main, qa]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Route smoke check
        run: pnpm --dir web run smoke:routes

      - name: Build
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
          APP_BASE_URL: https://example.com
          NEXT_PUBLIC_APP_URL: https://example.com
          WORKOS_API_KEY: sk_test_dummy
          WORKOS_CLIENT_ID: client_dummy
          WORKOS_COOKIE_PASSWORD: this-is-a-dummy-cookie-password-at-least-32
          NEXT_PUBLIC_WORKOS_REDIRECT_URI: https://example.com/callback
        run: pnpm build
