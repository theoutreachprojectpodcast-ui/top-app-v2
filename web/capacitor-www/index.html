<!doctype html>
<html lang="en" data-color-scheme="dark">
  <head>
    <meta charset="utf-8" />
    <title>The Outreach Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="application-name" content="TOP" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="TOP" />
    <meta name="theme-color" content="#121212" />
    <meta http-equiv="refresh" content="0;url=https://theoutreachproject.app/mobile" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        background: #121212;
        color: #e8eef6;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .boot {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom)
          env(safe-area-inset-left);
      }
      .boot__spinner {
        width: 44px;
        height: 44px;
        border: 3px solid rgba(34, 165, 43, 0.25);
        border-top-color: #22a52b;
        border-radius: 50%;
        animation: spin 0.85s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      (function () {
        var PROD = "https://theoutreachproject.app/mobile";
        function go() {
          try {
            window.location.replace(PROD);
          } catch (e) {
            try {
              window.location.href = PROD;
            } catch (e2) {}
          }
        }
        go();
        setTimeout(go, 120);
        setTimeout(go, 600);
        setTimeout(go, 1500);
      })();
    </script>
  </head>
  <body>
    <div class="boot" role="status" aria-live="polite">
      <div class="boot__spinner" aria-hidden="true"></div>
    </div>
  </body>
</html>
