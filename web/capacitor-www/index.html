<!doctype html>
<html lang="en" data-color-scheme="dark">
  <head>
    <meta charset="utf-8" />
    <title>The Outreach Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="application-name" content="TOP" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="TOP" />
    <meta name="theme-color" content="#121212" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        background: #121212;
        color: #e8eef6;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .boot {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom)
          env(safe-area-inset-left);
        background:
          radial-gradient(120% 80% at 50% 0%, rgba(34, 165, 43, 0.18), transparent 58%),
          linear-gradient(168deg, #1a241c 0%, #121212 42%, #121212 100%);
      }
      .boot__inner {
        text-align: center;
      }
      .boot__spinner {
        width: 44px;
        height: 44px;
        margin: 0 auto 1rem;
        border: 3px solid rgba(34, 165, 43, 0.25);
        border-top-color: #22a52b;
        border-radius: 50%;
        animation: spin 0.85s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="boot" role="status" aria-live="polite">
      <div class="boot__inner">
        <div class="boot__spinner" aria-hidden="true"></div>
        <p>Loading The Outreach Project…</p>
      </div>
    </div>
  </body>
</html>
