<!doctype html>
<html lang="en" data-color-scheme="dark">
  <head>
    <meta charset="utf-8" />
    <title>The Outreach Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#121212" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        background: #121212;
        color: #e8eef6;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .panel {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom)
          env(safe-area-inset-left);
      }
      .inner {
        max-width: 22rem;
        text-align: center;
        padding: 1.5rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
        font-weight: 600;
      }
      p {
        margin: 0 0 1.25rem;
        line-height: 1.5;
        color: rgba(232, 238, 246, 0.82);
      }
      button {
        appearance: none;
        border: none;
        border-radius: 999px;
        padding: 0.75rem 1.25rem;
        font: inherit;
        font-weight: 600;
        color: #fff;
        background: #22a52b;
        cursor: pointer;
        width: 100%;
      }
      .hint {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: rgba(232, 238, 246, 0.65);
      }
    </style>
    <script>
      (function () {
        var PROD = "https://theoutreachproject.app/";
        var HEALTH = "https://theoutreachproject.app/api/health/mobile";
        function go() {
          try {
            window.location.replace(PROD);
          } catch (e) {
            try {
              window.location.href = PROD;
            } catch (e2) {}
          }
        }
        function checkThenGo() {
          fetch(HEALTH, { cache: "no-store" })
            .then(function (r) {
              return r.json().catch(function () {
                return {};
              });
            })
            .then(function (body) {
              if (body && body.ok) go();
            })
            .catch(function () {});
        }
        checkThenGo();
        setTimeout(go, 1200);
        setTimeout(go, 4000);
        window.addEventListener("load", function () {
          var btn = document.getElementById("retry");
          if (btn) btn.addEventListener("click", function () {
            checkThenGo();
            go();
          });
        });
      })();
    </script>
  </head>
  <body>
    <div class="panel" role="alert">
      <div class="inner">
        <h1>Connecting&hellip;</h1>
        <p>Loading The Outreach Project from the server. Tap below if this screen stays.</p>
        <button type="button" id="retry">Try again</button>
        <p class="hint">Use <strong>theoutreachproject.app</strong> (with &ldquo;the&rdquo;).</p>
      </div>
    </div>
  </body>
</html>
